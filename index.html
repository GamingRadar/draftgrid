<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchGrid - Professional Drawing Workspace</title>
    <meta name="description" content="Professional workspace for generating drawing guides. 2D grids, 3D isometric guides, and document metadata.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="theme-light">
    <!-- Header: Mode & Orientation -->
    <header class="app-header">
        <div class="header-left">
            <div class="logo">
                <i data-lucide="grid-3x3" class="logo-icon"></i>
                <h1>SketchGrid</h1>
            </div>
        </div>
        <div class="header-center">
            <div class="dimension-toggle">
                <label class="mode-btn">
                    <input type="radio" name="dimension" value="2d" checked>
                    <span>2D Grid</span>
                </label>
                <label class="mode-btn">
                    <input type="radio" name="dimension" value="3d">
                    <span>3D Isometric</span>
                </label>
            </div>
            <div class="orientation-toggle">
                <label class="orient-btn">
                    <input type="radio" name="orientation" value="portrait" checked>
                    <span>Portrait</span>
                </label>
                <label class="orient-btn">
                    <input type="radio" name="orientation" value="landscape">
                    <span>Landscape</span>
                </label>
            </div>
        </div>
        <div class="header-right">
            <button id="theme-toggle" class="icon-button" title="Toggle Theme">
                <i data-lucide="sun" id="theme-icon-sun"></i>
                <i data-lucide="moon" id="theme-icon-moon" class="hidden"></i>
            </button>
            <button id="toggle-right-sidebar" class="primary-icon-button" title="Customize">
                <i data-lucide="settings-2"></i>
                <span>Customize</span>
            </button>
        </div>
    </header>

    <div class="app-main">
        <!-- Left Sidebar: Format & Branding -->
        <aside class="sidebar left-sidebar" id="left-sidebar">
            <div class="sidebar-scroll">
                <section class="sidebar-section">
                    <div class="section-title"><i data-lucide="zap"></i> Quick Start Presets</div>
                    <div class="section-content">
                        <div class="preset-grid">
                            <button class="preset-card" data-preset="ideation">
                                <i data-lucide="lightbulb"></i>
                                <span>Ideation</span>
                            </button>
                            <button class="preset-card" data-preset="thumbnails">
                                <i data-lucide="grid-3x3"></i>
                                <span>Thumbnails</span>
                            </button>
                            <button class="preset-card" data-preset="hero">
                                <i data-lucide="image"></i>
                                <span>Hero Frames</span>
                            </button>
                            <button class="preset-card" data-preset="storyboard">
                                <i data-lucide="film"></i>
                                <span>Storyboard</span>
                            </button>
                        </div>
                    </div>
                </section>
                <details class="sidebar-section" open>
                    <summary><i data-lucide="layout"></i> Grid Config</summary>
                    <div class="section-content">
                        <div class="control-group" id="2d-only">
                            <h4>Box Count (2-12)</h4>
                            <div class="input-wrapper">
                                <input type="range" id="box-count" min="2" max="12" value="6">
                                <span id="box-count-display">6</span>
                            </div>
                        </div>
                        <div class="control-group">
                            <h4>Aspect Ratio</h4>
                            <div class="radio-group-grid">
                                <label class="radio-item"><input type="radio" name="ratio" value="1:1" checked><span>1:1</span></label>
                                <label class="radio-item"><input type="radio" name="ratio" value="2:3"><span>2:3</span></label>
                                <label class="radio-item"><input type="radio" name="ratio" value="3:4"><span>3:4</span></label>
                                <label class="radio-item"><input type="radio" name="ratio" value="custom"><span>Custom</span></label>
                            </div>
                            <div id="custom-ratio-inputs" class="hidden mt-2">
                                <div class="input-row">
                                    <input type="number" id="ratio-w" value="16" step="0.1">
                                    <span>:</span>
                                    <input type="number" id="ratio-h" value="9" step="0.1">
                                </div>
                            </div>
                        </div>
                        <div class="control-group no-border">
                            <h4>Spacing</h4>
                            <div class="radio-group-grid">
                                <label class="radio-item"><input type="radio" name="spacing" value="small"><span>S</span></label>
                                <label class="radio-item"><input type="radio" name="spacing" value="medium" checked><span>M</span></label>
                                <label class="radio-item"><input type="radio" name="spacing" value="large"><span>L</span></label>
                            </div>
                        </div>
                    </div>
                </details>

                <details class="sidebar-section" open>
                    <summary><i data-lucide="printer"></i> Format & Pages</summary>
                    <div class="section-content">
                        <div class="control-group">
                            <h4>Page Margins</h4>
                            <select id="margin-preset" class="select-input">
                                <option value="none">Min (2mm)</option>
                                <option value="narrow">Narrow (5mm)</option>
                                <option value="default" selected>Default (10mm)</option>
                                <option value="wide">Wide (20mm)</option>
                                <option value="custom">Custom</option>
                            </select>
                            <input type="number" id="margin-val" value="10" class="text-input mt-2 hidden">
                        </div>
                        <div class="control-group">
                            <label class="checkbox-item mb-2">
                                <input type="checkbox" id="show-page-numbers" checked>
                                <span>Add Page Numbers</span>
                            </label>
                        </div>
                        <div class="control-group no-border">
                            <label class="checkbox-item mb-2">
                                <input type="checkbox" id="show-watermark" checked>
                                <span>Watermark</span>
                            </label>
                            <div class="input-wrapper">
                                <label class="font-tiny">Quantity</label>
                                <input type="number" id="page-count" value="1" min="1" max="25" class="text-input">
                            </div>
                        </div>
                    </div>
                </details>
            </div>
            <div class="sidebar-footer">
                <button id="download-pdf" class="primary-button">
                    <i data-lucide="download"></i> Export PDF
                </button>
            </div>
        </aside>

        <!-- Preview Area -->
        <main class="preview-area" id="main-preview">
            <div class="preview-container">
                <div class="preview-paper" id="paper-preview">
                    <canvas id="grid-canvas"></canvas>
                </div>
                <div class="preview-info">
                    <span id="p-orientation">Portrait</span> · <span id="p-ratio">1:1</span> · <span id="p-count">6 Boxes</span>
                </div>
            </div>
        </main>

        <!-- Right Drawer: Customize -->
        <aside class="sidebar right-sidebar" id="right-sidebar">
            <div class="sidebar-scroll">
                <details class="sidebar-section" open>
                    <summary><i data-lucide="shield-check"></i> Smart Engine</summary>
                    <div class="section-content">
                        <div class="control-group">
                            <h4>Header Space</h4>
                            <label class="checkbox-item mb-2">
                                <input type="checkbox" id="reserve-header">
                                <span>Manual Header Reserve</span>
                            </label>
                            <div class="slider-with-label">
                                <input type="range" id="header-height" min="10" max="40" value="15">
                                <span class="val-badge" id="header-height-display">15mm</span>
                            </div>
                        </div>
                        <div class="control-group no-border">
                            <h4>Footer Space</h4>
                            <label class="checkbox-item mb-2">
                                <input type="checkbox" id="reserve-footer">
                                <span>Manual Footer Reserve</span>
                            </label>
                            <div class="slider-with-label">
                                <input type="range" id="footer-height" min="10" max="40" value="15">
                                <span class="val-badge" id="footer-height-display">15mm</span>
                            </div>
                        </div>
                    </div>
                </details>

                <details class="sidebar-section" open>
                    <summary><i data-lucide="type"></i> Document Info</summary>
                    <div class="section-content">
                        <div class="control-group">
                            <input type="text" id="doc-title" placeholder="Project Title" class="text-input mb-2">
                            <input type="text" id="doc-subtitle" placeholder="Subtitle / Version" class="text-input mb-2">
                            <input type="text" id="doc-author" placeholder="Author Name" class="text-input">
                        </div>
                        <div class="checkbox-row mt-2">
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-labels" checked>
                                <span>Full Labels (Author: )</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-meta-border">
                                <span>Title Block Border</span>
                            </label>
                        </div>
                    </div>
                </details>

                <details class="sidebar-section">
                    <summary><i data-lucide="calendar"></i> Date System</summary>
                    <div class="section-content">
                        <div class="checkbox-row mb-2">
                            <label class="checkbox-item">
                                <input type="checkbox" id="show-date" checked>
                                <span>Include Date</span>
                            </label>
                        </div>
                        <div id="date-details">
                            <div class="radio-group-compact mb-2">
                                <label class="radio-item-mini"><input type="radio" name="date-mode" value="auto" checked><span>Today</span></label>
                                <label class="radio-item-mini"><input type="radio" name="date-mode" value="custom"><span>Custom</span></label>
                            </div>
                            <input type="text" id="custom-date-val" placeholder="e.g. Spring 2026" class="text-input mb-2 hidden">
                            <h4>Date Format</h4>
                            <select id="date-format" class="select-input">
                                <option value="DD-MM-YYYY">DD-MM-YYYY</option>
                                <option value="MM-DD-YYYY">MM-DD-YYYY</option>
                                <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                                <option value="DD/MM/YY">DD/MM/YY</option>
                            </select>
                        </div>
                    </div>
                </details>

                <details class="sidebar-section">
                    <summary><i data-lucide="palette"></i> Grid Aesthetics</summary>
                    <div class="section-content">
                        <div class="control-group no-border">
                            <h4>Grid Outline</h4>
                            <div class="input-row">
                                <input type="color" id="stroke-color" value="#1e293b" class="color-picker">
                                <input type="range" id="stroke-opacity" min="0.1" max="1" step="0.1" value="1">
                            </div>
                        </div>
                    </div>
                </details>
            </div>
            <div class="close-drawer-mobile">
                <button id="close-right-sidebar" class="secondary-button">Done</button>
            </div>
        </aside>
    </div>

    <!-- Mobile Navigation Buttons -->
    <nav class="mobile-nav">
        <button id="mobile-toggle-left" class="mobile-fab" title="Export Settings">
            <i data-lucide="file-text"></i>
        </button>
        <button id="mobile-toggle-right" class="mobile-fab accent" title="Customize">
            <i data-lucide="sliders"></i>
        </button>
    </nav>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
